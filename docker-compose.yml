version: '3.8'

services:
  api:
    build: .
    container_name: mission-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mission_db
      - SPRING_DATASOURCE_USERNAME=mission_user
      - SPRING_DATASOURCE_PASSWORD=mission_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: mission-redis
    ports:
      - "6379:6379"
    restart: unless-stopped


  postgres:
    image: postgres:15.8
    container_name: mission-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mission_db
      POSTGRES_USER: mission_user
      POSTGRES_PASSWORD: mission_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_user -d mission_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
